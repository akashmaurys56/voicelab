<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Text to Speech - English & Hindi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🗣️ मुफ्त Text to Speech</h1>
        <p>इंग्लिश और हिंदी में आवाज़ बनाएँ</p>

        <textarea id="textInput" placeholder="यहाँ अपना टेक्स्ट लिखें..."></textarea>

        <div class="controls">
            <label for="languageSelect">भाषा चुनें:</label>
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="hi-IN">हिंदी</option>
            </select>

            <button id="speakBtn">🔊 बोलो</button>
        </div>

        <p class="note">नोट: यह आपके ब्राउज़र की built-in आवाज़ों का इस्तेमाल करता है।</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
