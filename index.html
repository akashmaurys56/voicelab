<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICELAB PRO - Advanced Text to Speech</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🎤 VOICELAB <span class="pro-badge">PRO</span></h1>
        <p class="subtitle">Advanced Text to Voice Generator - English & Hindi</p>
        
        <div class="toolbar">
            <button id="uploadBtn" title="टेक्स्ट फाइल अपलोड करें">
                <i class="fas fa-upload"></i> अपलोड
            </button>
            <button id="clearBtn" title="टेक्स्ट साफ करें">
                <i class="fas fa-trash"></i> क्लियर
            </button>
            <button id="copyBtn" title="टेक्स्ट कॉपी करें">
                <i class="fas fa-copy"></i> कॉपी
            </button>
        </div>
        
        <textarea id="textInput" placeholder="यहाँ अपना टेक्स्ट लिखें... (Type your text here...)"></textarea>
        
        <div class="controls-grid">
            <div class="control-item">
                <label for="languageSelect">
                    <i class="fas fa-language"></i> भाषा:
                </label>
                <select id="languageSelect">
                    <option value="en-US">English (US)</option>
                    <option value="hi-IN">हिंदी (Hindi)</option>
                </select>
            </div>
            
            <div class="control-item">
                <label for="voiceSelect">
                    <i class="fas fa-microphone"></i> आवाज़:
                </label>
                <select id="voiceSelect">
                    <option value="">डिफ़ॉल्ट आवाज़</option>
                </select>
            </div>
            
            <div class="control-item">
                <label for="speedRange">
                    <i class="fas fa-tachometer-alt"></i> स्पीड: <span id="speedValue">1.0</span>x
                </label>
                <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
            </div>
            
            <div class="control-item">
                <label for="pitchRange">
                    <i class="fas fa-chart-line"></i> पिच: <span id="pitchValue">1.0</span>
                </label>
                <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1">
            </div>
        </div>
        
        <div class="action-buttons">
            <button id="speakBtn" class="primary-btn">
                <i class="fas fa-play"></i> बोलें / Speak
            </button>
            <button id="stopBtn" class="secondary-btn">
                <i class="fas fa-stop"></i> रोकें
            </button>
            <button id="downloadBtn" class="secondary-btn">
                <i class="fas fa-download"></i> MP3 डाउनलोड
            </button>
        </div>
        
        <div class="status" id="status"></div>
        <p class="note">✨ ब्राउज़र की built-in आवाज़ों का इस्तेमाल करता है। MP3 डाउनलोड सिर्फ Chrome में काम करता है।</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
