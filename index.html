<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICELAB - Free Text to Speech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 20px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        label {
            color: #555;
            font-weight: 500;
        }
        
        select {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 25px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .note {
            text-align: center;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }
        
        .status {
            text-align: center;
            color: #667eea;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 VOICELAB</h1>
        <p class="subtitle">Free Text to Voice Generator - English & Hindi</p>
        
        <textarea id="textInput" placeholder="यहाँ अपना टेक्स्ट लिखें... (Type your text here...)"></textarea>
        
        <div class="controls">
            <label for="languageSelect">भाषा / Language:</label>
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="hi-IN">हिंदी (Hindi)</option>
            </select>
            
            <button id="speakBtn">
                <span>🔊</span> बोलें / Speak
            </button>
        </div>
        
        <div class="status" id="status"></div>
        <p class="note">✨ ब्राउज़र की built-in आवाज़ों का इस्तेमाल करता है। कोई इंटरनेट डेटा नहीं लगता।</p>
    </div>

    <script>
        const speakBtn = document.getElementById('speakBtn');
        const textInput = document.getElementById('textInput');
        const languageSelect = document.getElementById('languageSelect');
        const statusDiv = document.getElementById('status');

        function showStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.style.color = isError ? '#e53e3e' : '#667eea';
        }

        speakBtn.addEventListener('click', function() {
            const text = textInput.value.trim();
            const lang = languageSelect.value;

            if (text === '') {
                showStatus('❌ कृपया कुछ टेक्स्ट लिखें!', true);
                return;
            }

            showStatus('🔄 आवाज़ बन रही है...');

            // Web Speech API
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 1; // स्पीड नॉर्मल
            utterance.pitch = 1; // पिच नॉर्मल

            // जब बोलना शुरू हो
            utterance.onstart = function() {
                showStatus('🔊 बोल रहा हूँ...');
            };

            // जब बोलना खत्म हो
            utterance.onend = function() {
                showStatus('✅ हो गया!');
            };

            // अगर कोई एरर हो
            utterance.onerror = function(event) {
                showStatus('❌ एरर: ' + event.error, true);
            };

            // बोलना शुरू करें
            window.speechSynthesis.cancel(); // पहले से चल रही आवाज़ रोकें
            window.speechSynthesis.speak(utterance);
        });

        // ब्राउज़र में वॉयसेस लोड होने पर
        window.speechSynthesis.onvoiceschanged = function() {
            const voices = window.speechSynthesis.getVoices();
            console.log('Available voices:', voices.length);
        };

        // एंटर की दबाने पर भी बोले (Ctrl+Enter)
        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                speakBtn.click();
            }
        });
    </script>
</body>
</html>
