<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICELAB PRO - ElevenLabs Style TTS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-wave-square"></i>
                <span>VOICELAB</span>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-microphone"></i>
                    <span>Voice Lab</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <div class="user-info">
                    <span class="user-name">Akash</span>
                    <span class="user-plan">Free Plan</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>Voice Laboratory</h1>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="credits">
                        <i class="fas fa-bolt"></i>
                        <span>10,000 / 10,000 credits</span>
                    </div>
                </div>
            </div>

            <!-- TTS Generator Card -->
            <div class="tts-card">
                <div class="card-header">
                    <h2>Text to Speech Generator</h2>
                    <p>Transform your text into natural-sounding speech</p>
                </div>

                <div class="input-section">
                    <textarea 
                        id="textInput" 
                        placeholder="Enter your text here... (यहाँ अपना टेक्स्ट लिखें...)"
                        maxlength="5000"
                    ></textarea>
                    <div class="text-stats">
                        <span id="charCount">0</span> / 5000 characters
                    </div>
                </div>

                <div class="voice-settings">
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>🌐 Language</label>
                            <select id="language">
                                <option value="en">English (US)</option>
                                <option value="en-gb">English (UK)</option>
                                <option value="hi">हिंदी (Hindi)</option>
                                <option value="es">Español</option>
                                <option value="fr">Français</option>
                                <option value="de">Deutsch</option>
                            </select>
                        </div>

                        <div class="setting-item">
                            <label>🎭 Voice Style</label>
                            <select id="voiceStyle">
                                <option value="default">Default</option>
                                <option value="male">👨 Male</option>
                                <option value="female">👩 Female</option>
                                <option value="child">🧒 Child</option>
                                <option value="old">👴 Old</option>
                            </select>
                        </div>

                        <div class="setting-item">
                            <label>⚡ Speed</label>
                            <div class="slider-container">
                                <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
                                <span id="speedValue">1.0x</span>
                            </div>
                        </div>

                        <div class="setting-item">
                            <label>🎵 Pitch</label>
                            <div class="slider-container">
                                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
                                <span id="pitchValue">1.0</span>
                            </div>
                        </div>

                        <div class="setting-item">
                            <label>🔊 Stability</label>
                            <div class="slider-container">
                                <input type="range" id="stability" min="0" max="1" step="0.1" value="0.5">
                                <span id="stabilityValue">50%</span>
                            </div>
                        </div>

                        <div class="setting-item">
                            <label>🎯 Clarity</label>
                            <div class="slider-container">
                                <input type="range" id="clarity" min="0" max="1" step="0.1" value="0.7">
                                <span id="clarityValue">70%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="generateBtn" class="btn-primary">
                        <i class="fas fa-play"></i>
                        Generate Speech
                    </button>
                    <button id="downloadBtn" class="btn-secondary">
                        <i class="fas fa-download"></i>
                        Download MP3
                    </button>
                    <button id="stopBtn" class="btn-secondary" style="background: #dc2626;">
                        <i class="fas fa-stop"></i>
                        Stop
                    </button>
                </div>

                <!-- Audio Player -->
                <div class="audio-player" id="audioPlayer" style="display: none;">
                    <audio controls id="audioElement"></audio>
                </div>

                <!-- Status -->
                <div class="status" id="status"></div>
            </div>

            <!-- Voice Samples Grid -->
            <div class="voice-samples">
                <h3>Voice Samples</h3>
                <div class="samples-grid" id="voiceSamples">
                    <!-- Samples will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
