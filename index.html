<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICELAB - Free Text to Speech</title>
    <!-- CSS फाइल लिंक -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎤 VOICELAB</h1>
        <p class="subtitle">Free Text to Voice Generator - English & Hindi</p>
        
        <textarea id="textInput" placeholder="यहाँ अपना टेक्स्ट लिखें... (Type your text here...)"></textarea>
        
        <div class="controls">
            <label for="languageSelect">भाषा / Language:</label>
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="hi-IN">हिंदी (Hindi)</option>
            </select>
            
            <button id="speakBtn">
                <span>🔊</span> बोलें / Speak
            </button>
        </div>
        
        <div class="status" id="status"></div>
        <p class="note">✨ ब्राउज़र की built-in आवाज़ों का इस्तेमाल करता है। कोई इंटरनेट डेटा नहीं लगता।</p>
    </div>

    <!-- JavaScript फाइल लिंक -->
    <script src="script.js"></script>
</body>
</html>
